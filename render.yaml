version: 1
services:
  - type: web
    name: evolution-api
    env: docker
    region: frankfurt
    plan: starter
    image: evoapicloud/evolution-api:latest
    startCommand: npm run start:prod

    envVars:
      - key: GLOBAL_API_KEY
        sync: false
        value: your-super-secret-global-key-here

      - key: AUTHENTICATION_API_KEY
        sync: false
        value: your-super-secret-global-key-here

      - key: SERVER_URL
        value: https://evolution-api.onrender.com

      - key: SERVER_PORT
        value: 8080

      - key: DATABASE_ENABLED
        value: "true"

      - key: DATABASE_PROVIDER
        value: postgresql

      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString

      - key: DATABASE_SAVE_DATA_INSTANCE
        value: "true"

      - key: DATABASE_SAVE_DATA_NEW_MESSAGE
        value: "true"

      - key: LOG_LEVEL
        value: INFO,ERROR,WARN

      - key: TELEMETRY_ENABLED
        value: "false"

    disk:
      name: evolution-instances
      mountPath: /evolution/instances
      sizeGB: 5

databases:
  - name: evolution-db
    plan: starter
    region: frankfurt
