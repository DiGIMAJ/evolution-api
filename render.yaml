version: 1
services:
  - type: web
    name: evolution-api
    env: docker
    plan: starter
    region: frankfurt

    image:
      url: atendai/evolution-api:latest

    envVars:
      - key: AUTHENTICATION_API_KEY
        value: your-secret-key

      - key: SERVER_URL
        value: https://evolution-api.onrender.com

      - key: DATABASE_ENABLED
        value: "true"

      - key: DATABASE_PROVIDER
        value: postgresql

      - key: DATABASE_CONNECTION_URI
        fromDatabase:
          name: evolution-db
          property: connectionString

      # Disable Redis (IMPORTANT)
      - key: CACHE_REDIS_ENABLED
        value: "false"

databases:
  - name: evolution-db
    plan: starter
